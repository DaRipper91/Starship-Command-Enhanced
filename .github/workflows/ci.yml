name: 'CI: Build, Lint, Test'
on:
  push:
    branches: [main, 'checkpoint/**', 'feature/**', 'fix/**', 'copilot/**']
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check || (npm install -g typescript && tsc -p tsconfig.json --noEmit)

      - name: Lint
        run: export ESLINT_USE_FLAT_CONFIG=false && npm run lint

      - name: Run tests
        run: bun test src/lib/api.test.ts

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          BUILD_SIZE=$(du -sh dist | cut -f1)
          echo "Build size: $BUILD_SIZE"
          # Fail if over 10MB uncompressed
          BUILD_BYTES=$(du -sb dist | cut -f1)
          if [ "$BUILD_BYTES" -gt 10485760 ]; then
            echo "Bundle too large: $BUILD_SIZE (max 10MB)"
            exit 1
          fi
